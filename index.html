<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Vip UNBAND V1 | CNXYOUR</title>
  <link rel="icon" href="https://files.catbox.moe/go92hk.jpg" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#05060a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="VXZ UNBAN V2">
  <link rel="apple-touch-icon" href="https://files.catbox.moe/ejn7q9.jpeg">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --size: 300px;
      --duration: 6s; /* ← ganti jadi 6 detik */
      --bg:#05060a;
      --accent:#F4320B;
      --accent2:#FF00F7;
      --muted:#EBE8EB;
      --mono:'Share Tech Mono', monospace;
      --ui: 'Inter', system-ui, sans-serif;
    }

    html,body{ height:100%; margin:0; background:var(--bg); color:#e6eef6; font-family:var(--ui); -webkit-font-smoothing:antialiased; }
    *{box-sizing:border-box}

    #introOverlay{
      position:fixed; inset:0; background:#000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:9999; transition: opacity .6s ease; pointer-events: auto;
    }
    .video-container { display:flex; flex-direction:column; align-items:center; gap:12px; }
    .video-wrap { width:var(--size); aspect-ratio:1/1; border-radius:10px; overflow:hidden; background:white; box-shadow:0 0 10px rgba(255,255,255,0.15); position:relative; }
    video#player { width:100%; height:100%; object-fit:cover; display:block; border:none; outline:none; pointer-events:none; }
    .loading-area { width:var(--size); display:flex; flex-direction:column; align-items:center; gap:8px; margin-top:8px; }
    .loading-text { font-weight:600; letter-spacing:0.05em; font-size:0.9rem; color:#fff; font-family:var(--ui); }
    .loading-bar { width:100%; height:8px; background: rgba(255,255,255,0.15); border-radius:999px; overflow:hidden; }
    .loading-bar i { display:block; height:100%; width:0%; background: linear-gradient(90deg,#fff,rgba(255,255,255,0.5)); border-radius:999px; animation: fillBar var(--duration) linear forwards; }
    @keyframes fillBar { from{width:0%} to{width:100%} }

    .dots { display:flex; gap:6px; margin-top:6px; }
    .dot { width:6px; height:6px; border-radius:50%; background:white; opacity:0.2; animation: blink 1s infinite; }
    .dot:nth-child(2){ animation-delay:.2s } .dot:nth-child(3){ animation-delay:.4s }
    @keyframes blink { 0%,80%,100%{opacity:.2; transform:translateY(0)} 40%{opacity:1; transform:translateY(-4px)} }

    .brand-text { margin-top:12px; font-family: "Orbitron", sans-serif; font-weight:900; font-size:1.1rem; letter-spacing:2px; color:#fff; text-shadow:0 0 10px rgb(120,120,120); user-select:none; }

    .watermark-intro { position:absolute; bottom:15px; right:20px; font-family:var(--mono); font-size:11px; color:rgba(255,255,255,0.25); letter-spacing:1px; text-transform:uppercase; z-index:10; user-select:none; pointer-events:none; }
    .skip-btn { position:absolute; top:15px; right:20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; padding:6px 14px; border-radius:20px; font-size:12px; font-family:var(--ui); cursor:pointer; z-index:20; transition:0.2s; backdrop-filter:blur(4px); }
    .skip-btn:hover { background:rgba(255,255,255,0.25); }

    #introOverlay.hidden { opacity:0; pointer-events:none; }
    @media (max-width:400px){ :root{ --size:250px } .brand-text{ font-size:1rem } }

    #app { opacity:0; visibility:hidden; transition: opacity .45s ease .1s, visibility .45s ease .1s; padding:18px; min-height:100vh; position:relative; }
    #app.visible { opacity:1; visibility:visible; }

    .topbar { display:flex; align-items:center; background:transparent; padding:8px 12px; }
    .title-top { font-family:var(--mono); font-size:18px; font-weight:600; color:var(--accent); }
    .robot-box{ background:radial-gradient(circle at 30% 20%, rgba(124,92,255,0.06), transparent 20%), linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005)); border-radius:10px; padding:14px; margin-bottom:12px; border:1px solid rgba(255,255,255,0.02); width:280px; margin-left:auto; margin-right:auto; margin-top:40px; }
    .robot-face { width:120px; height:120px; border-radius:50%; background:#000; display:flex; align-items:center; justify-content:center; font-size:56px; margin:0 auto; box-shadow:0 0 15px rgba(0,0,0,0.6); }
    .robot-title-normal { font-size:18px; text-align:center; margin-top:8px; color:#e6eef6; font-weight:600; }

    .form-label{ font-size:12px; font-weight:500; margin:12px 0 6px; display:block; text-align:left; width:280px; margin-left:auto; margin-right:auto; }
    .input, select, .btn { width:280px; margin:0 auto; padding:10px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.06); background:#071018; color:#7b8a97; font-size:14px; outline:none; display:block; }
    .btn{ margin-top:18px; padding:12px 14px; background:linear-gradient(90deg,var(--accent),var(--accent2)); border:0; border-radius:10px; color:#000; font-weight:800; cursor:pointer; font-size:15px; transition:0.2s; }
    .btn:hover { transform:scale(1.02); filter:brightness(1.1); }
    .status{ margin-top:12px; font-size:13px; color:var(--muted); min-height:20px; width:280px; margin-left:auto; margin-right:auto; }
    .small{ font-size:12px; color:var(--muted); margin-top:6px; width:280px; margin-left:auto; margin-right:auto; text-align:center; }
    .overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); display:none; z-index:998; }
    .overlay.active { display:block; }
    .select-wrapper { position:relative; width:280px; margin:0 auto; }
    .select-wrapper::after { content:"\25BC"; position:absolute; right:14px; top:50%; transform:translateY(-50%); color:#7b8a97; }

    .footer-watermark { text-align:center; margin-top:40px; padding:20px 0 10px; border-top:1px solid rgba(255,255,255,0.05); font-family:var(--mono); font-size:13px; color:rgba(255,255,255,0.15); letter-spacing:2px; }
    .footer-watermark span { color:var(--accent); font-weight:bold; }

    #welcomeBox { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(6px); background:rgba(0,0,0,0.25); z-index:10000; opacity:0; pointer-events:none; transition: opacity .35s ease; }
    #welcomeBox.active { opacity:1; pointer-events:auto; }
    #welcomeContent { background:rgba(0,0,0,0.6); padding:20px 26px; border-radius:10px; backdrop-filter:blur(10px); box-shadow:0 10px 30px rgba(0,0,0,0.6); text-align:center; }
    .gradientText{ font-family:'Orbitron', sans-serif; font-weight:900; font-size:22px; background:linear-gradient(90deg,#ff0000,#ff4a4a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:1px; }

    @media (max-width:420px){ .input, select, .btn, .form-label { width:220px; } .robot-box{ width:220px; } }
  </style>
</head>
<body>

  <!-- INTRO -->
  <div id="introOverlay" aria-hidden="false">
    <button class="skip-btn" id="skipIntro">Skip ⏭</button>
    <div class="watermark-intro">by Pikxyzz</div>

    <div class="video-container">
      <div class="video-wrap">
        <video id="player" playsinline preload="metadata">
          <source src="intro.mp4" type="video/mp4">
        </video>
      </div>
      <div class="loading-area" id="loading">
        <div class="loading-text">Loading</div>
        <div class="loading-bar"><i id="bar"></i></div>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
      <div class="brand-text">VIP UNBANNED APPS</div>
    </div>
  </div>

  <!-- WELCOME POPUP -->
  <div id="welcomeBox" aria-hidden="true">
    <div id="welcomeContent">
      <div class="gradientText">YUKOSOOO!</div>
      <div style="font-size:12px; color:#aaa; margin-top:8px;">by Pikxyzz</div>
    </div>
  </div>

  <!-- APP -->
  <div id="app" role="main" aria-hidden="true">
    <header class="topbar"><div class="title-top">XYZ UNBANNED</div></header>
    <div class="overlay" id="overlay" aria-hidden="true"></div>

    <div class="robot-box" aria-hidden="false">
      <div class="robot-face">
        <img src="https://files.catbox.moe/x3xd8q.jpg" alt="Logo Robot" style="max-height:100%; max-width:100%; border-radius:50%;">
      </div>
      <div class="robot-title-normal">Xyz Unban WhatsApp</div>
    </div>

    <label class="form-label" for="nomor">Nomor :</label>
    <input type="tel" id="nomor" class="input" placeholder="+628×××" inputmode="tel" aria-required="true" />

    <label class="form-label" for="alasan">Pilih Opsi Band</label>
    <div class="select-wrapper">
      <select id="alasan" class="input" aria-required="true">
        <option value="">UNBANNED OPTION</option>
        <option value="permafresh">PERMA FRESH</option>
        <option value="SPAM">SPAM</option>
        <option value="PERMA HARD">PERMA HARD</option>
        <option value="PERMASEMINGGU">PERMA -SEMINGGU</option>
        <option value="opsi5">PERMA BATU</option>
      </select>
    </div>

    <button class="btn" id="sendBtn" aria-label="Kirim Banding">UNBANNED</button>
    <div class="status" id="statusArea" aria-live="polite"></div>
    <div class="small">VIP METODE UNBANNED APPS</div>

    <div class="footer-watermark"><span>by Pikxyzz</span> • XYZ UNBAND</div>
    <main class="empty" aria-hidden="true"></main>
  </div>

  <!-- AUDIO -->
  <audio id="audioClick" preload="auto">
    <source src="-.mp3" type="audio/mpeg">
  </audio>
  <audio id="audioSuccess" preload="auto">
    <source src="-.mp3" type="audio/mpeg">
  </audio>
  <audio id="audioIntro" preload="auto">
    <source src="-.mp3" type="audio/mpeg">
  </audio>

<script>
  // ===== AUDIO =====
  const clickSound = document.getElementById('audioClick');
  const successSound = document.getElementById('audioSuccess');
  const introSound = document.getElementById('audioIntro');

  function playSound(audioEl, vol = 0.3) {
    if(!audioEl) return;
    try { audioEl.volume = vol; audioEl.currentTime = 0; audioEl.play().catch(()=>{}); } catch(e){}
  }

  // ===== INTRO =====
  const video = document.getElementById("player");
  const bar = document.getElementById("bar");
  const loading = document.getElementById("loading");
  const introOverlay = document.getElementById("introOverlay");
  const app = document.getElementById("app");
  const welcomeBox = document.getElementById("welcomeBox");
  const skipBtn = document.getElementById("skipIntro");

  const DURATION = 6; // cd

  document.documentElement.style.setProperty("--duration", DURATION + "s");
  if (bar) bar.style.animationDuration = DURATION + "s";

  function tryPlay() {
    video.muted = false;
    video.volume = 1.0;
    video.play().catch(() => {
      video.muted = true;
      video.play().catch(()=>{});
    });
    playSound(introSound, 0.2);
  }
  window.addEventListener("load", tryPlay);

  function showAppAfterIntro() {
    introOverlay.classList.add("hidden");
    setTimeout(() => {
      introOverlay.style.display = "none";
      app.classList.add("visible");
      app.setAttribute("aria-hidden","false");

      setTimeout(()=> {
        welcomeBox.classList.add("active");
        welcomeBox.setAttribute("aria-hidden","false");
        setTimeout(()=> {
          welcomeBox.classList.remove("active");
          welcomeBox.setAttribute("aria-hidden","true");
        }, 3000);
      }, 200);
    }, 620);
  }

  setTimeout(() => {
    if (loading) loading.classList.add("hidden");
    showAppAfterIntro();
  }, DURATION * 1000);

  skipBtn.addEventListener('click', () => {
    video.pause();
    if (loading) loading.classList.add("hidden");
    showAppAfterIntro();
    playSound(clickSound, 0.2);
  });

  // ===== APP LOGIC (unban) =====
  const sendBtn = document.getElementById('sendBtn');
  const statusEl = document.getElementById('statusArea');
  const nomorInput = document.getElementById('nomor');
  const alasanSelect = document.getElementById('alasan');

  function enc(v){ return encodeURIComponent(v || ''); }
  function isAndroid(){ return /Android/i.test(navigator.userAgent); }
  function setStatus(t){ statusEl.textContent = t; }
  function normalizeNumber(n){
    if(!n) return n;
    const s=n.trim().replace(/\s+/g,'');
    if(/^[0][0-9]+$/.test(s)) return '62'+s.slice(1);
    if(/^\+/.test(s)) return s;
    return s;
  }

  function buildTemplate(nomor, alasan){
    const tampilNomor = (nomor.startsWith('+') || nomor.startsWith('62')) ? nomor : ('+'+nomor);
    switch(alasan){
      case "permafresh": return { to: 'support@support.whatsapp.com', subject: 'Hello whatsapp developer, please help me.', body: `Hello developer, my Whatsapp is Vixzz. I would like to ask for help regarding my account being blocked a few hours ago...\n${tampilNomor}` };
      case "SPAM": return { to: 'support@support.whatsapp.com', subject: 'tolong saya', body: `Hallo developer whatsapp saya vixzz...\n${tampilNomor}` };
      case "PERMA HARD": return { to: 'support@support.whatsapp.com', subject: `please unblock this WhatsApp account [ ${tampilNomor} ]`, body: `Hi developer, I'm contacting you via WhatsApp to request a review...` };
      case "PERMASEMINGGU": return { to: 'support@support.whatsapp.com', subject: 'help me plss', body: `Hi WhatsApp Developer, I'm vixzz. My WhatsApp account (+${tampilNomor}) was blocked without reason...` };
      case "opsi5": return { to: 'support@support.whatsapp.com', subject: 'hi', body: `Hizmet şartlarınızı ihlal etmedim... ${tampilNomor}` };
      default: return { to: 'support@support.whatsapp.com', subject: `My WhatsApp number was blocked ${tampilNomor}`, body: `प्रिय व्हाट्सएप सपोर्ट टीम...` };
    }
  }

  function buildIntentUrl(t){ return `intent://compose?to=${enc(t.to)}&subject=${enc(t.subject)}&body=${enc(t.body)}#Intent;scheme=mailto;package=com.google.android.gm;end`; }
  function buildMailtoUrl(t){ return `mailto:${enc(t.to)}?subject=${enc(t.subject)}&body=${enc(t.body)}`; }
  function buildGmailWebUrl(t){ return `https://mail.google.com/mail/?view=cm&fs=1&to=${enc(t.to)}&su=${enc(t.subject)}&body=${enc(t.body)}`; }

  sendBtn.addEventListener('click',()=>{
    playSound(clickSound, 0.3);
    let nomor=(nomorInput.value||'').trim();
    let alasan=(alasanSelect.value||'');
    if(!nomor || !alasan){ setStatus("Mohon isi nomor & pilih alasan."); return; }
    nomor = normalizeNumber(nomor);
    const tpl = buildTemplate(nomor, alasan);
    const intentUrl = buildIntentUrl(tpl);
    const mailtoUrl = buildMailtoUrl(tpl);
    const gmailWebUrl = buildGmailWebUrl(tpl);

    sendBtn.disabled = true;
    sendBtn.setAttribute('aria-busy','true');
    setStatus("Membuka email...");

    if(isAndroid()){
      try{ window.location.href = intentUrl; } catch(e){}
      let handled=false;
      const fallback = ()=>{
        if(handled) return;
        handled=true;
        setStatus("GAGAL...");
        try{ window.location.href = mailtoUrl; } catch(e){
          try{ window.open(gmailWebUrl,'_blank'); } catch(err){ setStatus("Gagal membuka email."); }
        }
        sendBtn.disabled=false;
        sendBtn.removeAttribute('aria-busy');
      };
      const onVisChange = ()=>{
        if(document.hidden){
          handled=true;
          setStatus("Compose terbuka.");
          sendBtn.disabled=false;
          sendBtn.removeAttribute('aria-busy');
          playSound(successSound, 0.2);
        }
      };
      document.addEventListener('visibilitychange', onVisChange, {once:true});
      setTimeout(()=>{ if(!handled) fallback(); }, 1200);
    } else {
      try{
        window.location.href = mailtoUrl;
        setTimeout(()=>{
          if(!document.hidden){
            try{ window.open(gmailWebUrl,"_blank"); } catch(e){}
          }
          sendBtn.disabled=false;
          sendBtn.removeAttribute('aria-busy');
          playSound(successSound, 0.2);
        },900);
      }catch(err){
        try{ window.open(gmailWebUrl,"_blank"); } catch(e){}
        sendBtn.disabled=false;
        sendBtn.removeAttribute('aria-busy');
      }
    }
  });
</script>
</body>
</html>
